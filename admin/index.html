<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Knicks 2026 — Admin</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=VT323&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=3" />
  <link rel="stylesheet" href="/admin/admin.css?v=6" />
</head>
<body class="admin">
  <header class="admin-top">
    <h1>🏀 KNICKS ADMIN <span>control room</span></h1>
    <div class="admin-top-right">
      <a href="/" class="link">← view site</a>
      <span id="who"></span>
      <button id="logout" class="btn ghost" hidden>Log out</button>
    </div>
  </header>

  <!-- LOGIN (visible by default; JS hides it once an authenticated session is found) -->
  <section id="login" class="login">
    <form id="loginForm" class="login-card">
      <h2>Admin sign in</h2>
      <label>Email <input id="email" type="email" autocomplete="username" required /></label>
      <label>Password <input id="password" type="password" autocomplete="current-password" required /></label>
      <button class="btn" type="submit">Sign in</button>
      <p id="loginErr" class="err" hidden></p>
    </form>
  </section>

  <!-- APP -->
  <main id="app" class="admin-app" hidden>
    <nav class="tabs" id="tabs">
      <button class="tab is-on" data-tab="accounts">Accounts</button>
      <button class="tab" data-tab="keywords">Keywords</button>
      <button class="tab" data-tab="players">Players</button>
      <button class="tab" data-tab="celebrities">Celebrities</button>
      <button class="tab" data-tab="series">Series</button>
      <button class="tab" data-tab="games">Games</button>
      <button class="tab" data-tab="settings">Settings</button>
      <button class="tab" data-tab="runs">Runs</button>
    </nav>
    <div id="panel" class="panel"></div>
    <p id="toast" class="toast" hidden></p>
  </main>

  <script type="module" src="/admin/admin.js?v=6"></script>
</body>
</html>
